<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ali Honosh Admin</title>

<style>

body{
    font-family:Tahoma;
    background:#f8f0f5;
    margin:0;
    padding:20px;
}

.form-container{
    max-width:900px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.header{
    text-align:center;
    color:#d81b60;
    font-size:28px;
    font-weight:bold;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    margin-bottom:6px;
}

input,select,textarea{
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
}

textarea{
    min-height:120px;
}

.preview{
    width:220px;
    height:220px;
    border:2px dashed #ccc;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border-radius:15px;
    background:#fafafa;
}

.preview img{
    max-width:100%;
    max-height:100%;
}

.buttons{
    margin-top:20px;
    text-align:center;
}

button{
    background:#d81b60;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.msg{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

</style>

</head>
<body>

<div class="form-container">

<div class="header">
لوحة إدارة كوزمتك علي حنوش
</div>

<div class="grid">

<div class="group">
<label>اسم المنتج</label>
<input id="name">
</div>

<div class="group">
<label>السعر</label>
<input id="price">
</div>

<div class="group">
<label>القسم</label>
<select id="category"></select>
</div>

<div class="group">
<label>القسم الفرعي</label>
<select id="subcategory"></select>
</div>

<div class="group">
<label>الشارة</label>
<select id="badge"></select>
</div>

<div class="group">
<label>نفاذ الكمية</label>
<select id="stock">
<option value="لا">لا</option>
<option value="نعم">نعم</option>
</select>
</div>

</div>

<br>

<div class="group">
<label>اختيار صورة المنتج</label>
<input type="file" id="imageFile" accept="image/*">
<input type="hidden" id="image">
</div>

<br>

<div class="preview">
<img id="previewImg">
</div>

<br>

<div class="group">
<label>الوصف</label>
<textarea id="description"></textarea>
</div>

<div class="buttons">
<button onclick="saveProduct()">حفظ المنتج</button>
</div>

<div class="msg" id="msg"></div>

</div>

    
<script>

document.getElementById("imageFile").addEventListener("change", function () {

  const file = this.files[0];

  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(e){
      document.getElementById("previewImg").src = e.target.result;
  };

  reader.readAsDataURL(file);

});
let allProducts = [];

async function loadCategories() {

  const response = await fetch(
    "https://opensheet.vercel.app/1Zn2TakHVmDIEc45EHBoSygIMhBqoxq-91arajm5Pu1k/sheet1"
  );

  allProducts = await response.json();

  const categories = [
    ...new Set(
      allProducts
        .map(p => (p["القسم"] || "").trim())
        .filter(x => x)
    )
  ];

  const cat = document.getElementById("category");
  cat.innerHTML = "";

  categories.forEach(c => {
    cat.innerHTML += `<option value="${c}">${c}</option>`;
  });

  loadSubcategories();
  loadBadges();
}

function loadSubcategories() {
  const selectedCategory =
    document.getElementById("category").value;

  const sub = document.getElementById("subcategory");

  sub.innerHTML = "";

  const subcategories = [
    ...new Set(
      allProducts
        .filter(p =>
          (p["القسم"] || "").trim() === selectedCategory
        )
        .map(p => (p["القسم الفرعي"] || "").trim())
        .filter(x => x)
    )
  ];

  subcategories.forEach(s => {
    sub.innerHTML += `<option value="${s}">${s}</option>`;
  });
}

function loadBadges() {
  const badge = document.getElementById("badge");

  badge.innerHTML = "";

  const badges = [
    "",
    ...new Set(
      allProducts
        .map(p => (p["شارة"] || "").trim())
        .filter(x => x)
    )
  ];

  badges.forEach(b => {
    badge.innerHTML += `<option value="${b}">${b}</option>`;
  });
}

document.addEventListener("DOMContentLoaded", async () => {

  await loadCategories();

  document
    .getElementById("category")
    .addEventListener("change", loadSubcategories);

});
async function saveProduct(){

  let imageUrl = "";

  const file = document.getElementById("imageFile").files[0];

  if(file){

    const reader = new FileReader();

    const base64 = await new Promise(resolve => {
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });

    const uploadResponse = await fetch(
      "https://script.google.com/macros/s/AKfycbzBm0_gzjDSL0BYZ8YzOxfm7egwFdw4sxwfiAqiXhMkAJtGDyZ6-Lum9uvkuWFxOpuLSw/exec",
      {
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify({
          upload:true,
          fileName:file.name,
          base64Data:base64
        })
      }
    );

    // لن نستطيع قراءة الرد بسبب no-cors
    // لذلك سنختبر أولاً هل الطلب يصل أم لا
  }

  const data = {

    name:document.getElementById("name").value,
    category:document.getElementById("category").value,
    subcategory:document.getElementById("subcategory").value,
    price:document.getElementById("price").value,
    description:document.getElementById("description").value,
    image:imageUrl,
    badge:document.getElementById("badge").value,
    stock:document.getElementById("stock").value

  };

  fetch(
    "https://script.google.com/macros/s/AKfycbzBm0_gzjDSL0BYZ8YzOxfm7egwFdw4sxwfiAqiXhMkAJtGDyZ6-Lum9uvkuWFxOpuLSw/exec",
    {
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify(data)
    }
  );

document.getElementById("msg").innerHTML =
    "تم إرسال الطلب بنجاح";
}

</script>

</body>
</html>
